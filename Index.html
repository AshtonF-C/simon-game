<!DOCTYPE html>
<html>
<head>
  <title>Simon Game</title>

  <style>
    body {
      text-align:center;
      font-family: Arial;
      background:#111;
      color:white;
    }

    .btn {
      width:100px;
      height:100px;
      margin:10px;
      display:inline-block;
      border-radius:15px;
      opacity:0.6;
      transition:0.2s;
    }

    #red { background:red; }
    #blue { background:blue; }
    #green { background:green; }
    #yellow { background:yellow; }

    .active {
      opacity:1;
      transform: scale(1.1);
    }
  </style>
</head>

<body>

<h1>Simon Game</h1>
<h2 id="status">Press Start</h2>

<div>
  <div class="btn" id="red"></div>
  <div class="btn" id="blue"></div><br>
  <div class="btn" id="green"></div>
  <div class="btn" id="yellow"></div>
</div>

<button onclick="startGame()">Start</button>

<script>
let sequence = [];
let playerSequence = [];
let colors = ["red","blue","green","yellow"];

// ---- AUDIO SYSTEM ----
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(color){
  let freq;

  if(color === "red") freq = 261.6;
  if(color === "blue") freq = 329.6;
  if(color === "green") freq = 392.0;
  if(color === "yellow") freq = 523.3;

  let osc = audioCtx.createOscillator();
  let gain = audioCtx.createGain();

  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.frequency.value = freq;
  osc.type = "sine";

  gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.3);

  osc.start();
  osc.stop(audioCtx.currentTime + 0.3);
}

// ---- VIBRATION ----
function vibrate(pattern){
  if(navigator.vibrate){
    navigator.vibrate(pattern);
  }
}

function startGame(){
  sequence = [];
  nextRound();
}

function nextRound(){
  playerSequence = [];
  document.getElementById("status").innerText = "Watch...";

  let next = colors[Math.floor(Math.random()*4)];
  sequence.push(next);

  playSequence();
}

function playSequence(){
  let i = 0;

  let interval = setInterval(() => {
    flash(sequence[i]);
    playSound(sequence[i]);
    vibrate(60);

    i++;

    if(i >= sequence.length){
      clearInterval(interval);
      document.getElementById("status").innerText = "Your turn!";
    }
  }, 700);
}

function flash(color){
  let el = document.getElementById(color);
  el.classList.add("active");

  setTimeout(() => {
    el.classList.remove("active");
  }, 300);
}

// ---- PLAYER INPUT ----
document.querySelectorAll(".btn").forEach(btn=>{
  btn.onclick = () => {
    let color = btn.id;

    playerSequence.push(color);

    flash(color);
    playSound(color);
    vibrate(40);

    check();
  };
});

function check(){
  let i = playerSequence.length - 1;

  if(playerSequence[i] !== sequence[i]){
    document.getElementById("status").innerText = "Game Over!";
    vibrate([200,100,200,100,400]);
    return;
  }

  if(playerSequence.length === sequence.length){
    document.getElementById("status").innerText = "Good!";
    vibrate(120);

    setTimeout(nextRound, 900);
  }
}
</script>

</body>
</html>
